<!DOCTYPE html>
<html>
<head>
  <title>Restaurant Menu</title>
  <style>
    body {
      background-image: url("https://img.freepik.com/premium-photo/restaurant-wood-table-background_577526-84.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      font-family: "Segoe UI", Arial, sans-serif;
      text-align: center;
      padding: 60px;
      color: #fff;
    }

    .menu {
      max-width: 900px;
      margin: 0 auto;
    }

    .feedback {
      display: block;
      margin: 20px auto 70px auto;
      padding: 35px;
      width: 85%;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      border-radius: 50px;
      text-decoration: none;
      font-size: 28px;
      font-weight: 600;
      box-shadow: 0 6px 16px rgba(0,0,0,0.4);
      transition: all 0.3s ease;
    }

    .feedback:hover {
      background: rgba(0, 0, 0, 0.8);
      transform: scale(1.05);
    }

    .row {
      display: flex;
      justify-content: center;
      gap: 140px;   /* spacing between buttons */
      margin: 80px 0; /* spacing between rows */
    }

    .button {
      flex: 0 0 35%;
      padding: 40px;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border-radius: 50px;
      text-decoration: none;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 1px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.4);
      transition: all 0.3s ease;
    }

    .button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-6px);
    }
  </style>
</head>
<body>
  <div class="menu">
    <a href="feedback.html" class="feedback">Feedback</a>

    <div class="row">
      <a href="main.html" class="button">Main Dishes</a>
      <a href="drinks.html" class="button">Drinks</a>
    </div>

    <div class="row">
      <a href="desserts.html" class="button">Desserts</a>
      <a href="sides.html" class="button">Side Dishes</a>
    </div>
  </div>
</body>
</html>
